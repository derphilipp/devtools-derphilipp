name: Build and Release .deb

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed for tag-based versioning

      - name: Determine next version
        id: version
        run: |
          # Find the latest semver tag (e.g. v1.2.3)
          LATEST_TAG=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -1)

          if [ -z "$LATEST_TAG" ]; then
            # No tags yet — start at 1.0.0
            NEXT_VERSION="1.0.0"
          else
            # Strip leading 'v' and increment patch
            VERSION="${LATEST_TAG#v}"
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)
            PATCH=$(echo "$VERSION" | cut -d. -f3)
            PATCH=$((PATCH + 1))
            NEXT_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          fi

          echo "version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEXT_VERSION" >> "$GITHUB_OUTPUT"
          echo "Next version: $NEXT_VERSION"

      - name: Install nfpm
        run: |
          NFPM_VERSION="2.41.1"
          curl -sfL "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/nfpm_${NFPM_VERSION}_linux_amd64.tar.gz" \
            | tar xz -C /usr/local/bin nfpm
          nfpm --version

      - name: Update version in nfpm.yaml
        run: |
          sed -i "s/^version: .*/version: ${{ steps.version.outputs.version }}/" nfpm.yaml

      - name: Make scripts executable
        run: |
          chmod +x scripts/postinstall.sh
          chmod +x scripts/preremove.sh

      - name: Build .deb package
        run: |
          nfpm package --packager deb --target .
          ls -lh devtools-derphilipp_*.deb

      - name: Create git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "devtools-derphilipp ${{ steps.version.outputs.version }}"
          body: |
            ## devtools-derphilipp v${{ steps.version.outputs.version }}

            Install on target machine:
            ```bash
            sudo apt install -y ./devtools-derphilipp_${{ steps.version.outputs.version }}_all.deb
            ```
          files: devtools-derphilipp_*.deb
          generate_release_notes: true
